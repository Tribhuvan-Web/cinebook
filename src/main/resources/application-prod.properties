# =====================
# Production Datasource Configuration
# =====================
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}

# =====================
# JWT Configuration
# =====================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# =====================
# Brevo API Integration
# =====================
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${BREVO_SENDER_EMAIL}
brevo.sender.name=${BREVO_SENDER_NAME}
// In application.properties or application.yml
server.port=${PORT:8080}
# =====================
# Super Admin Configuration
# =====================
app.super.admin.email=${SUPER_ADMIN_EMAIL}
app.super.admin.name=${SUPER_ADMIN_NAME}

# =====================
#Frontend Configuration
# =====================
frontend.url=${FRONTEND_URL}

# =====================
# OpenAPI/Swagger Configuration
# =====================
springdoc.api-docs.path=${SPRINGDOC_API_DOCS_PATH}
springdoc.swagger-ui.path=${SPRINGDOC_SWAGGER_UI_PATH}
springdoc.swagger-ui.operationsSorter=${SPRINGDOC_SWAGGER_UI_OPERATIONS_SORTER}
springdoc.swagger-ui.tagsSorter=${SPRINGDOC_SWAGGER_UI_TAGS_SORTER}
springdoc.swagger-ui.tryItOutEnabled=${SPRINGDOC_SWAGGER_UI_TRY_IT_OUT_ENABLED}
springdoc.swagger-ui.filter=${SPRINGDOC_SWAGGER_UI_FILTER}
movieDekho.openapi.dev-url=${MOVIEDEKHO_OPENAPI_DEV_URL}
movieDekho.openapi.prod-url=${MOVIEDEKHO_OPENAPI_PROD_URL}

# =====================
# Temporary Seat Lock Cleanup Configuration
# =====================
movie-dekho.cleanup.enable-auto-cleanup=${MOVIEDEKHO_CLEANUP_ENABLE_AUTO_CLEANUP}

# =====================
# Razorpay Live Configuration (PRODUCTION ONLY)
# =====================
razorpay.key.id=${RAZORPAY_LIVE_KEY_ID}
razorpay.key.secret=${RAZORPAY_LIVE_KEY_SECRET}
movie-dekho.cleanup.cleanup-interval=${MOVIEDEKHO_CLEANUP_CLEANUP_INTERVAL}
movie-dekho.cleanup.deep-cleanup-hours=${MOVIEDEKHO_CLEANUP_DEEP_CLEANUP_HOURS}
movie-dekho.cleanup.log-cleanup-operations=${MOVIEDEKHO_CLEANUP_LOG_CLEANUP_OPERATIONS}

# =====================
# Heroku Configuration
# =====================
server.port=${PORT:8080}

# =====================
# CineBook AI Assistant Configuration
# =====================
cinebook.assistant.retrieval-top-k=${CINEBOOK_ASSISTANT_RETRIEVAL_TOP_K:8}
cinebook.assistant.strict-grounding=${CINEBOOK_ASSISTANT_STRICT_GROUNDING:true}
cinebook.assistant.seat-optimization.enabled=${CINEBOOK_ASSISTANT_SEAT_OPTIMIZATION_ENABLED:true}
cinebook.assistant.upselling.enabled=${CINEBOOK_ASSISTANT_UPSELLING_ENABLED:true}
cinebook.assistant.upselling.min-confidence=${CINEBOOK_ASSISTANT_UPSELLING_MIN_CONFIDENCE:0.6}

# =====================
# Google Gemini AI Configuration
# =====================
gemini.api.key=${GEMINI_API_KEY}
gemini.model.name=${GEMINI_MODEL_NAME:gemini-2.5-flash}
gemini.api.endpoint=${GEMINI_API_ENDPOINT:https://generativelanguage.googleapis.com/v1beta/models}
gemini.model.temperature=${GEMINI_MODEL_TEMPERATURE:0.7}
gemini.model.max-tokens=${GEMINI_MODEL_MAX_TOKENS:1000}
gemini.assistant.enabled=${GEMINI_ASSISTANT_ENABLED:true}
