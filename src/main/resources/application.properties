# =====================
# Temporary Seat Lock Cleanup Configuration
# =====================
# Enable/disable automatic cleanup (default: true)
movie-dekho.cleanup.enable-auto-cleanup=true
# Cleanup interval in milliseconds (default: 3600000 = 1 hour)
movie-dekho.cleanup.cleanup-interval=3600000
# How old locks should be before deep cleanup in hours (default: 1)
movie-dekho.cleanup.deep-cleanup-hours=1
# Whether to log cleanup operations (default: true)
movie-dekho.cleanup.log-cleanup-operations=true

# =====================
# Email Queue Configuration
# =====================
# Enable/disable email queue processing
app.email.queue.enabled=true
# Number of emails to process in each batch
app.email.queue.batch-size=10
# Processing interval in milliseconds (30 seconds)
app.email.queue.processing-interval=30000
# Maximum retry attempts for failed emails
app.email.queue.max-retries=3
# Base delay between retries in minutes (1 hour)
app.email.queue.base-retry-delay-minutes=60
# Use exponential backoff for retries
app.email.queue.exponential-backoff=true
# Maximum delay between retries in minutes (24 hours)
app.email.queue.max-retry-delay-minutes=1440
# Number of days to keep sent emails before cleanup
app.email.queue.keep-sent-emails-days=30
# Number of days to keep failed emails before cleanup
app.email.queue.keep-failed-emails-days=7
# Maximum number of emails to send per day (0 = no limit)
app.email.queue.daily-email-limit=300
# Pause processing when daily limit is reached
app.email.queue.pause-on-daily-limit=true
# Processing timeout in minutes (for stuck email detection)
app.email.queue.processing-timeout-minutes=10
# Enable detailed logging
app.email.queue.enable-detailed-logging=true
# Email priorities (higher number = higher priority)
app.email.queue.welcome-email-priority=5
app.email.queue.otp-email-priority=10
app.email.queue.password-reset-email-priority=8
app.email.queue.admin-notification-priority=6
app.email.queue.general-email-priority=1